name: auth-cloak

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # PostgreSQL has no route to/from internet or Docker host

volumes:
  postgres_data:
  keycloak_data:

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: auth-cloak-postgres
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_lock_waits=on
    security_opt:
      - no-new-privileges:true

  # ── Keycloak 26 ─────────────────────────────────────────────────────────────
  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    image: auth-cloak/keycloak:26.1.2
    container_name: auth-cloak-keycloak
    restart: unless-stopped
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ── Database ─────────────────────────────────────────────────────────────
      KC_DB:          postgres
      KC_DB_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # ── Hostname / Proxy ─────────────────────────────────────────────────────
      KC_HOSTNAME:                  ${KC_HOSTNAME}
      KC_HOSTNAME_STRICT:           "true"
      KC_HTTP_ENABLED:              "true"
      KC_PROXY_HEADERS:             xforwarded
      # Trust X-Forwarded-* headers only from the Docker bridge range (nginx only)
      KC_PROXY_TRUSTED_ADDRESSES:   172.0.0.0/8
      # ── Bootstrap admin (effective on FIRST start only) ───────────────────────
      KC_BOOTSTRAP_ADMIN_USERNAME:  ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD:  ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      # ── Observability ────────────────────────────────────────────────────────
      KC_HEALTH_ENABLED:            "true"
      KC_METRICS_ENABLED:           "true"
      # ── Logging ──────────────────────────────────────────────────────────────
      KC_LOG_CONSOLE_OUTPUT:        json
      KC_LOG_LEVEL:                 info
      # ── JVM heap ─────────────────────────────────────────────────────────────
      JAVA_OPTS_KC_HEAP:            "-Xms512m -Xmx1024m"
    volumes:
      # Realm JSONs: auto-imported on first start if realm does not exist
      - ./realms:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/conf/keycloak.conf:/opt/keycloak/conf/keycloak.conf:ro
    # expose (container-to-container) only — NOT bound to host
    expose:
      - "8080"   # application
      - "9000"   # management (health / metrics)
    healthcheck:
      # KC base image (UBI micro) has no curl. Use bash /dev/tcp to check the management port.
      # Port 9000 only accepts connections once KC is fully ready.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 2>/dev/null && echo OK || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    mem_limit: 1536m
    memswap_limit: 1536m
    cpus: "2"

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: auth-cloak-nginx
    restart: unless-stopped
    networks:
      - frontend
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL certs placed by Linux admin; gitignored
      - ./ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
