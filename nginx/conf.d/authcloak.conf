# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name authcloak.saeon.ac.za;

    # Docker healthcheck needs a plain-HTTP response
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name authcloak.saeon.ac.za;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/authcloak.crt;
    ssl_certificate_key /etc/nginx/ssl/authcloak.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

    # ── Shared proxy settings ─────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    proxy_buffer_size        128k;
    proxy_buffers            4 256k;
    proxy_busy_buffers_size  256k;
    proxy_connect_timeout    90s;
    proxy_send_timeout       90s;
    proxy_read_timeout       90s;

    # ── Admin console — LAN only ──────────────────────────────────────────────
    # Blocks external access before the request reaches Keycloak.
    location ~ ^/(admin|realms/master) {
        allow 192.168.117.0/24;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny  all;

        limit_req zone=admin burst=5 nodelay;
        limit_req_log_level warn;

        proxy_pass http://keycloak:8080;
    }

    # ── Token / login endpoints — stricter rate limit ─────────────────────────
    location ~ ^/realms/[^/]+/(protocol/openid-connect/token|login-actions) {
        limit_req zone=auth burst=10 nodelay;
        limit_req_log_level warn;

        proxy_pass http://keycloak:8080;
    }

    # ── Block metrics from public ─────────────────────────────────────────────
    location /metrics {
        deny all;
    }

    # ── All other Keycloak traffic ────────────────────────────────────────────
    location / {
        limit_req zone=global burst=30 nodelay;
        proxy_pass http://keycloak:8080;
    }
}
