# Local WSL testing nginx config — no IP restriction, localhost server_name.
# This file is only used when running with docker-compose.local.yml.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost;

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/authcloak.crt;
    ssl_certificate_key /etc/nginx/ssl/authcloak.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;
    proxy_connect_timeout   90s;
    proxy_send_timeout      90s;
    proxy_read_timeout      90s;

    # Security headers (same as prod)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # Block metrics from public (same as prod)
    location /metrics {
        deny all;
    }

    # Admin — open to all in local testing (no IP restriction)
    location ~ ^/(admin|realms/master) {
        proxy_pass http://keycloak:8080;
    }

    # Stricter rate limit for token endpoints (optional but kept for fidelity)
    location ~ ^/realms/[^/]+/(protocol/openid-connect/token|login-actions) {
        proxy_pass http://keycloak:8080;
    }

    location / {
        proxy_pass http://keycloak:8080;
    }
}
