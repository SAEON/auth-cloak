user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Structured JSON access log ────────────────────────────────────────────
    log_format main_json escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time"'
        '}';
    access_log /var/log/nginx/access.log main_json;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    client_max_body_size 10m;
    client_body_timeout  30s;
    client_header_timeout 30s;
    send_timeout         30s;

    # ── Hide nginx version ────────────────────────────────────────────────────
    server_tokens off;

    # ── TLS session cache (shared across workers) ─────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Rate-limit zones ──────────────────────────────────────────────────────
    # Per-IP: general traffic
    limit_req_zone $binary_remote_addr zone=global:20m rate=20r/s;
    # Per-IP: token / login endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/s;
    # Per-IP: admin console (internal-only anyway, extra safety)
    limit_req_zone $binary_remote_addr zone=admin:10m  rate=2r/s;

    limit_req_status  429;
    limit_conn_status 429;

    include /etc/nginx/conf.d/*.conf;
}
