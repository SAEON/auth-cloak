# Keycloak 26 static configuration — non-secret settings committed safely.
# Secrets (passwords, hostnames) are in environment variables.

# ── Database connection pool ──────────────────────────────────────────────────
db-pool-min-size=5
db-pool-initial-size=10
db-pool-max-size=50

# ── Cache (single-node: no clustering overhead) ───────────────────────────────
cache=local

# ── HTTP listener (Nginx handles TLS; KC listens plain HTTP internally) ────────
http-port=8080
http-enabled=true

# ── Management interface (health + metrics on port 9000) ─────────────────────
http-management-port=9000
health-enabled=true
metrics-enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
log-console-output=json
log-level=INFO

# ── Disable sticky session route suffix (not useful on single node) ───────────
spi-sticky-session-encoder-infinispan-should-attach-route=false
